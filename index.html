        if (cleanItem === "XAUUSD") return "XAU/USD";

    function calculateEMA(values, period) {
      if (!values || values.length < period) return null;

      const k = 2 / (period + 1);
      let ema = values.slice(0, period).reduce((sum, value) => sum + value, 0) / period;

      for (let i = period; i < values.length; i++) {
        ema = values[i] * k + ema * (1 - k);
      }

      return ema;
    }

    function calculateATR(candles, period = 14) {
      if (!candles || candles.length < period + 1) return 0;

      const trs = [];

      for (let i = 1; i < candles.length; i++) {
        const high = candles[i].high;
        const low = candles[i].low;
        const prevClose = candles[i - 1].close;

        const tr = Math.max(
          high - low,
          Math.abs(high - prevClose),
          Math.abs(low - prevClose)
        );

        trs.push(tr);
      }

      const recent = trs.slice(-period);
      return recent.reduce((sum, value) => sum + value, 0) / recent.length;
    }

    function findSwings(candles, lookback = 2) {
      const swings = [];

      for (let i = lookback; i < candles.length - lookback; i++) {
        let isSwingHigh = true;
        let isSwingLow = true;

        for (let j = i - lookback; j <= i + lookback; j++) {
          if (j === i) continue;

          if (candles[i].high <= candles[j].high) {
            isSwingHigh = false;
          }

          if (candles[i].low >= candles[j].low) {
            isSwingLow = false;
          }
        }

        if (isSwingHigh) {
          swings.push({
            index: i,
            type: "high",
            price: candles[i].high
          });
        }

        if (isSwingLow) {
          swings.push({
            index: i,
            type: "low",
            price: candles[i].low
          });
        }
      }

      return swings;
    }

    function detectStructureEvent(candles) {
      const swings = findSwings(candles, 2);

      if (swings.length < 4) {
        return {
          event: "Sin estructura clara",
          direction: "neutral",
          breakIndex: null,
          brokenLevel: null
        };
      }

      let previousDirection = "neutral";
      let lastEvent = {
        event: "Sin BOS/CHoCH",
        direction: "neutral",
        breakIndex: null,
        brokenLevel: null
      };

      for (let i = 5; i < candles.length; i++) {
        const previousSwings = swings.filter(s => s.index < i);

        const lastSwingHigh = [...previousSwings].reverse().find(s => s.type === "high");
        const lastSwingLow = [...previousSwings].reverse().find(s => s.type === "low");

        if (!lastSwingHigh || !lastSwingLow) continue;

        const close = candles[i].close;

        if (close > lastSwingHigh.price) {
          const event =
            previousDirection === "sell"
              ? "CHoCH alcista"
              : "BOS alcista";

          previousDirection = "buy";

          lastEvent = {
            event,
            direction: "buy",
            breakIndex: i,
            brokenLevel: lastSwingHigh.price
          };
        }

        if (close < lastSwingLow.price) {
          const event =
            previousDirection === "buy"
              ? "CHoCH bajista"
              : "BOS bajista";

          previousDirection = "sell";

          lastEvent = {
            event,
            direction: "sell",
            breakIndex: i,
            brokenLevel: lastSwingLow.price
          };
        }
      }

      return lastEvent;
    }

    function findOrderBlock(candles, structureEvent) {
      if (!structureEvent || structureEvent.breakIndex === null) return null;

      const breakIndex = structureEvent.breakIndex;
      const direction = structureEvent.direction;
      const start = Math.max(0, breakIndex - 12);

      if (direction === "buy") {
        for (let i = breakIndex - 1; i >= start; i--) {
          const candle = candles[i];
          const bearishCandle = candle.close < candle.open;

          if (bearishCandle) {
            return {
              type: "bullish",
              index: i,
              low: candle.low,
              high: candle.open,
              label: "Order Block alcista"
            };
          }
        }
      }

      if (direction === "sell") {
        for (let i = breakIndex - 1; i >= start; i--) {
          const candle = candles[i];
          const bullishCandle = candle.close > candle.open;

          if (bullishCandle) {
            return {
              type: "bearish",
              index: i,
              low: candle.open,
              high: candle.high,
              label: "Order Block bajista"
            };
          }
        }
      }

      return null;
    }

    function analyzeOrderBlockTouch(candles, orderBlock, breakIndex) {
      if (!orderBlock || breakIndex === null) {
        return {
          firstTouch: false,
          movedAway: false,
          touches: 0,
          status: "Sin Order Block"
        };
      }

      const atr = calculateATR(candles, 14);
      let touches = 0;
      let firstTouchIndex = null;

      for (let i = breakIndex + 1; i < candles.length; i++) {
        const candle = candles[i];

        const touched =
          candle.low <= orderBlock.high &&
          candle.high >= orderBlock.low;

        if (touched) {
          touches++;

          if (firstTouchIndex === null) {
            firstTouchIndex = i;
          }
        }
      }

      if (firstTouchIndex === null) {
        return {
          firstTouch: false,
          movedAway: false,
          touches,
          status: "Order Block creado, esperando primer toque"
        };
      }

      const candlesAfterTouch = candles.slice(firstTouchIndex);
      let movedAway = false;

      if (orderBlock.type === "bullish") {
        const maxHigh = Math.max(...candlesAfterTouch.map(c => c.high));
        movedAway = maxHigh - orderBlock.high >= atr * 0.5;
      }

      if (orderBlock.type === "bearish") {
        const minLow = Math.min(...candlesAfterTouch.map(c => c.low));
        movedAway = orderBlock.low - minLow >= atr * 0.5;
      }

      let status = "";

      if (touches === 1 && movedAway) {
        status = "Primer toque confirmado y precio se alejó";
      } else if (touches === 1 && !movedAway) {
        status = "Primer toque detectado, falta alejamiento";
      } else if (touches > 1) {
        status = "Order Block ya fue tocado varias veces";
      } else {
        status = "Esperando reacción";
      }

      return {
        firstTouch: touches === 1,
        movedAway,
        touches,
        status
      };
    }

    function analyzeSMC(candles) {
      const structureEvent = detectStructureEvent(candles);
      const orderBlock = findOrderBlock(candles, structureEvent);

      if (!orderBlock) {
        return {
          event: structureEvent.event,
          direction: structureEvent.direction,
          orderBlock: null,
          obStatus: "No se encontró Order Block válido"
        };
      }

      const obTouch = analyzeOrderBlockTouch(
        candles,
        orderBlock,
        structureEvent.breakIndex
      );

      return {
        event: structureEvent.event,
        direction: structureEvent.direction,
        orderBlock: {
          ...orderBlock,
          firstTouch: obTouch.firstTouch,
          movedAway: obTouch.movedAway,
          touches: obTouch.touches,
          status: obTouch.status
        },
        obStatus: obTouch.status
      };
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function analyzeMarket(candles) {
      const closes = candles.map(c => c.close);

      if (!candles || candles.length < 55) {
        return {
          trend: "flat",
          signal: "ESPERAR",
          score: 15,
          status: "ESPERAR",
          reason: "No hay suficientes velas para confirmar tendencia, BOS, CHoCH u Order Block.",

          ema20: null,
          ema50: null,
          direction: "neutral",
          smc: {
            event: "Sin datos",
            orderBlock: null,
            obStatus: "Sin datos"
          }
        };
      }

      const ema20 = calculateEMA(closes, 20);
      const ema50 = calculateEMA(closes, 50);
      const lastClose = closes[closes.length - 1];
      const previousClose = closes[closes.length - 5] || closes[closes.length - 2];
      const firstClose = closes[0];

      const changePercent = ((lastClose - firstClose) / firstClose) * 100;
      const shortMomentum = ((lastClose - previousClose) / previousClose) * 100;
      const emaSpread = ema50 ? Math.abs((ema20 - ema50) / ema50) * 100 : 0;

      const smc = analyzeSMC(candles);

      let trend = "flat";
      let signal = "ESPERAR";
      let status = "ESPERAR";
      let reason = "Mercado mixto o lateral. No hay ventaja clara para Buy ni Sell.";
      let score = 30;
      let direction = "neutral";

      const bullishEMA =
        lastClose > ema20 &&
        ema20 > ema50 &&
        shortMomentum > 0;

      const bearishEMA =
        lastClose < ema20 &&
        ema20 < ema50 &&
        shortMomentum < 0;

      const bullishSMC =
        smc.direction === "buy" &&
        (
          smc.event === "BOS alcista" ||
          smc.event === "CHoCH alcista"
        );

      const bearishSMC =
        smc.direction === "sell" &&
        (
          smc.event === "BOS bajista" ||
          smc.event === "CHoCH bajista"
        );

      const bullishOB =
        smc.orderBlock &&
        smc.orderBlock.type === "bullish" &&
        smc.orderBlock.firstTouch &&
        smc.orderBlock.movedAway;

      const bearishOB =
        smc.orderBlock &&
        smc.orderBlock.type === "bearish" &&
        smc.orderBlock.firstTouch &&
        smc.orderBlock.movedAway;

      if (bullishEMA && bullishSMC) {
        trend = "up";
        signal = "BUY";
        status = "BUY";
        direction = "buy";
        reason = "BUY fuerte: EMA alcista + " + smc.event + ".";
        score =
          62 +
          Math.min(emaSpread * 7, 18) +
          Math.min(Math.abs(shortMomentum) * 10, 22);

        if (bullishOB) {
          score += 15;
          reason += " Order Block alcista tocado por primera vez y respetado.";
        } else if (smc.orderBlock && smc.orderBlock.type === "bullish") {
          score += 7;
          reason += " Order Block alcista detectado.";
        }
      }

      if (bearishEMA && bearishSMC) {
        trend = "down";
        signal = "SELL";
        status = "SELL";
        direction = "sell";
        reason = "SELL fuerte: EMA bajista + " + smc.event + ".";
        score =
          62 +
          Math.min(emaSpread * 7, 18) +
          Math.min(Math.abs(shortMomentum) * 10, 22);

        if (bearishOB) {
          score += 15;
          reason += " Order Block bajista tocado por primera vez y respetado.";
        } else if (smc.orderBlock && smc.orderBlock.type === "bearish") {
          score += 7;
          reason += " Order Block bajista detectado.";
        }
      }

      if (!bullishEMA && bullishSMC && bullishOB) {
        trend = "up";
        signal = "BUY";
        status = "BUY";
        direction = "buy";
        reason = "BUY por SMC: " + smc.event + " + Order Block alcista respetado.";
        score = 72;
      }

      if (!bearishEMA && bearishSMC && bearishOB) {
        trend = "down";
        signal = "SELL";
        status = "SELL";
        direction = "sell";
        reason = "SELL por SMC: " + smc.event + " + Order Block bajista respetado.";
        score = 72;
      }

      if (
        status === "ESPERAR" &&
        bullishSMC &&
        !bullishOB
      ) {
        trend = "up";
        signal = "BUY DÉBIL";
        direction = "buy";
        reason = "Hay " + smc.event + ", pero falta primer toque y rechazo del Order Block.";
        score = 48;
      }

      if (
        status === "ESPERAR" &&
        bearishSMC &&
        !bearishOB
      ) {
        trend = "down";
        signal = "SELL DÉBIL";
        direction = "sell";
        reason = "Hay " + smc.event + ", pero falta primer toque y rechazo del Order Block.";
        score = 48;
      }

      if (Math.abs(shortMomentum) < 0.05) {
        score -= 8;
        reason += " Momentum bajo.";
      }

      if (emaSpread < 0.10) {
        score -= 6;
        reason += " EMAs muy juntas.";
      }

      score = Math.round(clamp(score, 0, 100));

      return {
        trend,
        signal,
        score,
        status,
        reason,
        changePercent,
        ema20,
        ema50,
        direction,
        smc
      };
    }

    async function fetchAssetData(asset, apiKey, interval) {
      const symbol = normalizeMarketSymbol(asset.category, asset.symbol);

      const url =
        "https://api.twelvedata.com/time_series" +
        "?symbol=" + encodeURIComponent(symbol) +
        "&interval=" + encodeURIComponent(interval) +
        "&outputsize=80" +
        "&apikey=" + encodeURIComponent(apiKey);

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.status === "error" || data.code || !data.values) {
          return {
            ...asset,
            symbol,
            status: "Error",
            reason: data.message || "No se pudo obtener información.",
            score: 0,
            price: null,
            trend: "flat",
            signal: "ESPERAR",
            smc: null
          };
        }

        const values = data.values.slice().reverse();

        const candles = values
          .map(candle => ({
            open: Number(candle.open),
            high: Number(candle.high),
            low: Number(candle.low),
            close: Number(candle.close)
          }))
          .filter(candle =>
            Number.isFinite(candle.open) &&
            Number.isFinite(candle.high) &&
            Number.isFinite(candle.low) &&
            Number.isFinite(candle.close)
          );

        if (!candles.length) {
          return {
            ...asset,
            symbol,
            status: "Error",
            reason: "No se encontraron precios válidos.",
            score: 0,
            price: null,
            trend: "flat",
            signal: "ESPERAR",
            smc: null
          };
        }

        const analysis = analyzeMarket(candles);
        const lastPrice = candles[candles.length - 1].close;

        return {
          ...asset,
          symbol,
          price: lastPrice,
          trend: analysis.trend,
          signal: analysis.signal,
          score: analysis.score,
          status: analysis.status,
          reason: analysis.reason,
          changePercent: analysis.changePercent,
          ema20: analysis.ema20,
          ema50: analysis.ema50,
          direction: analysis.direction,
          smc: analysis.smc,
          tvSymbol: asset.tvSymbol || tradingViewSymbolFromCategory(asset.category, symbol)
        };
      } catch (error) {
        return {
          ...asset,
          symbol,
          status: "Error",
          reason: "Error de conexión con la API.",
          score: 0,
          price: null,
          trend: "flat",
          signal: "ESPERAR",
          smc: null
        };
      }
    }

    async function updateAllMarketData() {
      const apiKey = document.getElementById("market-api-key").value.trim();
      const timeframe = document.getElementById("global-timeframe").value;
      const interval = twelveDataIntervalFromTimeframe(timeframe);

      if (!apiKey) {
        setMarketStatus("Falta API Key. Pégala arriba para actualizar precios.", "error");
        renderWatchlist();
        return;
      }

      saveMarketApiKey();
      saveTimeframe();

      setMarketStatus("Actualizando precios...", "info");

      const updatedAssets = [];

      for (let i = 0; i < assets.length; i++) {
        setMarketStatus("Actualizando " + assets[i].symbol + " (" + (i + 1) + "/" + assets.length + ")...", "info");

        const updated = await fetchAssetData(assets[i], apiKey, interval);
        updatedAssets.push(updated);
      }

      assets = updatedAssets.sort((a, b) => Number(b.score) - Number(a.score));

      saveAssets();
      renderWatchlist();
      updateLastUpdate();

      setMarketStatus("", "success");
    }

    function addAssetToWatchlist() {
      const category = document.getElementById("new-category").value;
      const rawSymbol = document.getElementById("new-symbol").value.trim();
      const rawTvSymbol = document.getElementById("new-tv-symbol").value.trim();

      if (!rawSymbol) {
        alert("Escribe un símbolo. Ej: SOXL, AAPL, EUR/USD, BTC/USDT.");
        return;
      }

      const symbol = normalizeMarketSymbol(category, rawSymbol);
      const tvSymbol = rawTvSymbol || tradingViewSymbolFromCategory(category, symbol);

      const exists = assets.some(asset => asset.symbol.toUpperCase() === symbol.toUpperCase());

      if (exists) {
        alert("Ese activo ya está en la watchlist.");
        return;
      }

      assets.push({
        symbol,
        category,
        tvSymbol,
        price: null,
        trend: "flat",
        signal: "ESPERAR",
        score: 0,
        status: "Pendiente",
        reason: "Agregado. Actualiza para buscar precio.",
        changePercent: 0,
        ema20: null,
        ema50: null,
        direction: "neutral",
        smc: null
      });

      document.getElementById("new-symbol").value = "";
      document.getElementById("new-tv-symbol").value = "";

      saveAssets();
      renderWatchlist();
    }

    function removeAsset(symbol) {
      assets = assets.filter(asset => asset.symbol !== symbol);
      saveAssets();
      renderWatchlist();
    }

    function createGaugeHTML(score) {
      const safeScore = Math.round(clamp(Number(score) || 0, 0, 100));
      const deg = Math.round(safeScore * 3.6);
      const cls = safeScore >= 75 ? "" : safeScore >= 55 ? "mid" : "low";

      return `
        <div class="gauge ${cls}" style="--percent: ${deg}deg;">
          <div class="text-white font-bold">${safeScore}%</div>
        </div>
      `;
    }

    function getTrendLabel(trend) {
      if (trend === "up") return `<span class="trend-up font-bold">↑ Alcista</span>`;
      if (trend === "down") return `<span class="trend-down font-bold">↓ Bajista</span>`;
      return `<span class="trend-flat font-bold">↔ Lateral / Mixto</span>`;
    }

    function decisionClass(status) {
      if (status === "BUY") return "decision-buy";
      if (status === "SELL") return "decision-sell";
      if (status === "ESPERAR") return "decision-wait";
      return "decision-no";
    }

    function formatDecision(status) {
      if (status === "BUY") return "✅ BUY";
      if (status === "SELL") return "🔴 SELL";
      if (status === "ESPERAR") return "🟡 ESPERAR";
      if (status === "Error") return "⚫ ERROR";
      if (status === "Pendiente") return "⚫ PENDIENTE";
      return escapeHTML(status);
    }

    function formatPrice(price) {
      if (price === null || price === undefined || Number.isNaN(Number(price))) return "Pendiente";
      const n = Number(price);

      if (n >= 1000) return n.toFixed(2);
      if (n >= 10) return n.toFixed(2);
      if (n >= 1) return n.toFixed(4);

      return n.toFixed(6);
    }

    function renderSMCBlock(asset) {
      if (!asset.smc) {
        return `
          <div class="mt-4 bg-gray-900/70 rounded-2xl p-4">
            <p class="text-gray-400 text-sm">SMC</p>
            <p class="text-gray-300">Esperando actualización.</p>
          </div>
        `;
      }

      const ob = asset.smc.orderBlock;

      if (!ob) {
        return `
          <div class="mt-4 bg-gray-900/70 rounded-2xl p-4">
            <p class="text-gray-400 text-sm">SMC</p>
            <p class="text-gray-200">${escapeHTML(asset.smc.event)}</p>
            <p class="text-gray-400 text-sm mt-1">${escapeHTML(asset.smc.obStatus)}</p>
          </div>
        `;
      }

      const obType =
        ob.type === "bullish"
          ? "Order Block alcista"
          : "Order Block bajista";

      const obColor =
        ob.type === "bullish"
          ? "text-emerald-400"
          : "text-red-400";

      return `
        <div class="mt-4 bg-gray-900/70 rounded-2xl p-4">
          <p class="text-gray-400 text-sm">SMC</p>

          <div class="grid md:grid-cols-3 gap-3 mt-2">
            <div>
              <p class="text-gray-400 text-xs">Estructura</p>
              <p class="text-white font-bold">${escapeHTML(asset.smc.event)}</p>
            </div>

            <div>
              <p class="text-gray-400 text-xs">Order Block</p>
              <p class="${obColor} font-bold">${obType}</p>
              <p class="text-gray-400 text-xs">
                Zona: ${formatPrice(ob.low)} - ${formatPrice(ob.high)}
              </p>
            </div>

            <div>
              <p class="text-gray-400 text-xs">Toque / reacción</p>
              <p class="text-gray-200 font-bold">${escapeHTML(ob.status)}</p>
              <p class="text-gray-400 text-xs">
                Toques: ${ob.touches}
              </p>
            </div>
          </div>
        </div>
      `;
    }

    function renderWatchlist() {
      const container = document.getElementById("watchlist-container");
      const timeframe = document.getElementById("global-timeframe")?.value || "15m";
      const tvInterval = tvIntervalFromTimeframe(timeframe);

      const sorted = [...assets].sort((a, b) => Number(b.score) - Number(a.score));

      container.innerHTML = sorted.map((asset, index) => {
        const score = Number(asset.score) || 0;
        const status = asset.status || "Pendiente";
        const cls = decisionClass(status);
        const price = formatPrice(asset.price);
        const change = Number(asset.changePercent || 0);
        const changeClass = change >= 0 ? "text-emerald-400" : "text-red-400";

        return `
          <div class="${cls} rounded-3xl p-5 md:p-6">
            <div class="grid xl:grid-cols-[1fr_420px] gap-6">
              <div>
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-5">
                  <div class="flex items-center gap-4">
                    <div class="text-3xl font-black text-gray-500">#${index + 1}</div>
                    ${createGaugeHTML(score)}
                    <div>
                      <h3 class="text-3xl font-bold">${escapeHTML(asset.symbol)}</h3>
                      <div class="flex flex-wrap gap-2 mt-2">
                        <span class="px-3 py-1 rounded-full text-xs bg-gray-900/70 text-gray-300">${escapeHTML(asset.category)}</span>
                        <span class="px-3 py-1 rounded-full text-xs bg-gray-900/70 text-gray-300">${escapeHTML(timeframe)}</span>
                        <span class="px-3 py-1 rounded-full text-xs bg-gray-900/70 text-gray-300">${escapeHTML(asset.signal)}</span>
                      </div>
                    </div>
                  </div>

                  <div class="text-left md:text-right">
                    <p class="text-gray-400 text-sm">Decisión</p>
                    <p class="text-3xl font-bold">${formatDecision(status)}</p>
                  </div>
                </div>

                <div class="grid md:grid-cols-4 gap-4 mt-6">
                  <div class="bg-gray-900/70 rounded-2xl p-4">
                    <p class="text-gray-400 text-sm">Precio</p>
                    <p class="text-emerald-400 text-2xl font-bold">${price}</p>
                  </div>

                  <div class="bg-gray-900/70 rounded-2xl p-4">
                    <p class="text-gray-400 text-sm">Tendencia</p>
                    <p class="text-xl">${getTrendLabel(asset.trend)}</p>
                  </div>

                  <div class="bg-gray-900/70 rounded-2xl p-4">
                    <p class="text-gray-400 text-sm">Cambio ventana</p>
                    <p class="${changeClass} text-2xl font-bold">${change.toFixed(2)}%</p>
                  </div>

                  <div class="bg-gray-900/70 rounded-2xl p-4">
                    <p class="text-gray-400 text-sm">EMA20 / EMA50</p>
                    <p class="text-sm text-gray-300">
                      ${asset.ema20 ? formatPrice(asset.ema20) : "N/A"} /
                      ${asset.ema50 ? formatPrice(asset.ema50) : "N/A"}
                    </p>
                  </div>
                </div>

                <div class="mt-5 bg-gray-900/70 rounded-2xl p-4">
                  <p class="text-gray-400 text-sm">Lectura del agente</p>
                  <p class="text-gray-200 mt-1">${escapeHTML(asset.reason)}</p>
                </div>

                ${renderSMCBlock(asset)}

                <div class="mt-4 flex flex-wrap gap-3">
                  <button onclick="removeAsset('${escapeHTML(asset.symbol)}')"
                    class="px-4 py-2 rounded-xl bg-gray-800 hover:bg-gray-700 text-sm font-semibold">
                    Eliminar
                  </button>
                </div>
              </div>

              <div>
                <div class="tv-chart">
                  <iframe
                    width="100%"
                    height="100%"
                    src="https://www.tradingview.com/widgetembed/?symbol=${encodeURIComponent(asset.tvSymbol)}&interval=${encodeURIComponent(tvInterval)}&theme=dark&hide_side_toolbar=1"
                    frameborder="0">
                  </iframe>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    window.onload = () => {
      loadMarketApiKey();
      loadTimeframe();
      renderWatchlist();

      const savedKey = localStorage.getItem("marketApiKey") || "";
      if (savedKey) {
        updateAllMarketData();
      }
    };
  </script>
</body>
