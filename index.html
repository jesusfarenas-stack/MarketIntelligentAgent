<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TRADING AGENT PRO - Watchlist Auto</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }

    * {
      scroll-behavior: auto !important;
    }

    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
      transform: none !important;
    }

    input, select {
      outline: none;
    }

    .gauge {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: conic-gradient(#22ff88 0deg, #22ff88 var(--percent), #1f2937 var(--percent));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px rgba(34, 255, 136, 0.35);
      flex-shrink: 0;
    }

    .gauge.mid {
      background: conic-gradient(#facc15 0deg, #facc15 var(--percent), #1f2937 var(--percent));
      box-shadow: 0 0 28px rgba(250, 204, 21, 0.28);
    }

    .gauge.low {
      background: conic-gradient(#ef4444 0deg, #ef4444 var(--percent), #1f2937 var(--percent));
      box-shadow: 0 0 28px rgba(239, 68, 68, 0.28);
    }

    .trend-up { color: #22ff88; }
    .trend-down { color: #ef4444; }
    .trend-flat { color: #facc15; }

    .decision-buy {
      background: linear-gradient(135deg, rgba(34,255,136,.18), rgba(16,185,129,.08));
      border: 1px solid rgba(34,255,136,.45);
    }

    .decision-sell {
      background: linear-gradient(135deg, rgba(239,68,68,.18), rgba(127,29,29,.08));
      border: 1px solid rgba(239,68,68,.45);
    }

    .decision-wait {
      background: linear-gradient(135deg, rgba(250,204,21,.18), rgba(113,63,18,.08));
      border: 1px solid rgba(250,204,21,.45);
    }

    .decision-no {
      background: linear-gradient(135deg, rgba(107,114,128,.18), rgba(31,41,55,.08));
      border: 1px solid rgba(107,114,128,.45);
    }

    .tv-chart {
      height: 360px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #1f2937;
      background: #020617;
    }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 min-h-screen">

    function safeParseJSON(value, fallback) {
      try {
        return JSON.parse(value) || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function escapeHTML(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function loadAssets() {
      const saved = safeParseJSON(localStorage.getItem("autoWatchlistAssets"), null);
      return Array.isArray(saved) && saved.length ? saved : DEFAULT_ASSETS;
    }

    function saveAssets() {
      localStorage.setItem("autoWatchlistAssets", JSON.stringify(assets));
    }

    function saveMarketApiKey() {
      const key = document.getElementById("market-api-key").value.trim();
      localStorage.setItem("marketApiKey", key);
    }

    function loadMarketApiKey() {
      const savedKey = localStorage.getItem("marketApiKey") || "";
      const input = document.getElementById("market-api-key");
      if (input) input.value = savedKey;
    }

    function saveTimeframe() {
      const timeframe = document.getElementById("global-timeframe").value;
      localStorage.setItem("globalTimeframe", timeframe);
    }

    function loadTimeframe() {
      const saved = localStorage.getItem("globalTimeframe");
      if (saved) {
        document.getElementById("global-timeframe").value = saved;
      }
    }

    function setMarketStatus(message, type = "info") {
      const el = document.getElementById("market-fetch-status");
      if (!el) return;

      el.textContent = message;

      if (type === "success") {
        el.className = "text-emerald-300 font-semibold";
      } else if (type === "error") {
        el.className = "text-red-300 font-semibold";
      } else {
        el.className = "text-amber-300 font-semibold";
      }
    }

    function updateLastUpdate() {
      const now = new Date();
      document.getElementById("last-update").textContent =
        "Última actualización: " + now.toLocaleString("es-US");
    }

    function twelveDataIntervalFromTimeframe(timeframe) {
      if (timeframe === "5m") return "5min";
      if (timeframe === "15m") return "15min";
      if (timeframe === "30m") return "30min";
      if (timeframe === "1H") return "1h";
      if (timeframe === "4H") return "4h";
      if (timeframe === "Diario") return "1day";
      return "15min";
    }

    function tvIntervalFromTimeframe(timeframe) {
      if (timeframe === "5m") return "5";
      if (timeframe === "15m") return "15";
      if (timeframe === "30m") return "30";
      if (timeframe === "1H") return "60";
      if (timeframe === "4H") return "240";
      if (timeframe === "Diario") return "D";
      return "15";
    }

    function normalizeMarketSymbol(category, item) {
      const cleanItem = String(item || "").trim().toUpperCase();
      const cleanCategory = String(category || "").toLowerCase();

      if (!cleanItem) return "";

      if (cleanCategory === "forex") {
        if (cleanItem.includes("/")) return cleanItem;
        if (cleanItem.length === 6) {
          return cleanItem.slice(0, 3) + "/" + cleanItem.slice(3);
        }
        return cleanItem;
      }

      if (cleanCategory === "crypto") {
        if (cleanItem.includes("/")) return cleanItem;
        if (cleanItem.endsWith("USDT")) return cleanItem.replace("USDT", "/USDT");
        if (cleanItem.endsWith("USD")) return cleanItem.replace("USD", "/USD");
        return cleanItem + "/USDT";
      }

      if (cleanCategory === "metal") {
        if (cleanItem === "GOLD") return "XAU/USD";
        if (cleanItem === "SILVER") return "XAG/USD";
        if (cleanItem === "XAUUSD") return "XAU/USD";
        if (cleanItem === "XAGUSD") return "XAG/USD";
        return cleanItem;
      }

      return cleanItem;
    }

    function tradingViewSymbolFromCategory(category, symbol) {
      const cleanCategory = String(category || "").toLowerCase();
      const cleanSymbol = String(symbol || "").toUpperCase();

      if (cleanCategory === "forex") return "FX:" + cleanSymbol.replace("/", "");
      if (cleanCategory === "crypto") return "BINANCE:" + cleanSymbol.replace("/", "");

      if (cleanCategory === "metal") {
        if (cleanSymbol === "XAU/USD") return "OANDA:XAUUSD";
        if (cleanSymbol === "XAG/USD") return "OANDA:XAGUSD";
        return "OANDA:" + cleanSymbol.replace("/", "");
      }

      if (cleanCategory === "etf") return "AMEX:" + cleanSymbol;
      if (cleanCategory === "stock") return "NASDAQ:" + cleanSymbol;

      return cleanSymbol;
    }

    function calculateEMA(values, period) {
      if (!values || values.length < period) return null;

      const k = 2 / (period + 1);
      let ema = values.slice(0, period).reduce((sum, value) => sum + value, 0) / period;

      for (let i = period; i < values.length; i++) {
        ema = values[i] * k + ema * (1 - k);
      }

      return ema;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function analyzeMarket(closes) {
      if (!closes || closes.length < 55) {
        return {
          trend: "flat",
          signal: "ESPERAR",
          score: 15,
          status: "Datos insuficientes",
          reason: "No hay suficientes velas para confirmar tendencia.",
          changePercent: 0,
          ema20: null,
          ema50: null
        };
      }

      const ema20 = calculateEMA(closes, 20);
      const ema50 = calculateEMA(closes, 50);
      const lastClose = closes[closes.length - 1];
      const previousClose = closes[closes.length - 5] || closes[closes.length - 2];
      const firstClose = closes[0];

      const changePercent = ((lastClose - firstClose) / firstClose) * 100;
      const shortMomentum = ((lastClose - previousClose) / previousClose) * 100;
      const emaSpread = ema50 ? Math.abs((ema20 - ema50) / ema50) * 100 : 0;

      let trend = "flat";
      let signal = "ESPERAR";
      let status = "ESPERAR";
      let reason = "Mercado mixto o lateral. EMAs sin alineación clara.";
      let score = 35;

      const bullish = lastClose > ema20 && ema20 > ema50 && shortMomentum > 0;
      const bearish = lastClose < ema20 && ema20 < ema50 && shortMomentum < 0;

      if (bullish) {
        trend = "up";
        signal = "BUY";
        status = "COMPRAR";
        reason = "Tendencia alcista: precio sobre EMA20, EMA20 sobre EMA50 y momentum positivo.";
        score = 62 + emaSpread * 6 + Math.abs(shortMomentum) * 8;
      } else if (bearish) {
        trend = "down";
        signal = "SELL";
        status = "VENDER";
        reason = "Tendencia bajista: precio bajo EMA20, EMA20 bajo EMA50 y momentum negativo.";
        score = 62 + emaSpread * 6 + Math.abs(shortMomentum) * 8;
      } else {
        trend = "flat";
        signal = "ESPERAR";
        status = "ESPERAR";
        reason = "No hay tendencia limpia. Esperar rompimiento o mejor estructura.";
        score = 25 + Math.min(Math.abs(shortMomentum) * 5, 20);
      }

      if (Math.abs(shortMomentum) < 0.05) {
        score -= 10;
        reason += " Momentum bajo.";
      }

      if (emaSpread < 0.10) {
        score -= 8;
        reason += " EMAs muy juntas.";
      }

      score = Math.round(clamp(score, 0, 100));

      return {
        trend,
        signal,
        score,
        status,
        reason,
        changePercent,
        ema20,
        ema50
      };
    }

    async function fetchAssetData(asset, apiKey, interval) {
      const symbol = normalizeMarketSymbol(asset.category, asset.symbol);

      const url =
        "https://api.twelvedata.com/time_series" +
        "?symbol=" + encodeURIComponent(symbol) +
        "&interval=" + encodeURIComponent(interval) +
        "&outputsize=80" +
        "&apikey=" + encodeURIComponent(apiKey);

      try {
        const response = await fetch(url);
        const data = await response.json();

        if (data.status === "error" || data.code || !data.values) {
          return {
            ...asset,
            symbol,
            status: "Error",
            reason: data.message || "No se pudo obtener información.",
            score: 0,
            price: null,
            trend: "flat",
            signal: "ESPERAR"
          };
        }

        const values = data.values.slice().reverse();

        const closes = values
          .map(candle => Number(candle.close))
          .filter(value => Number.isFinite(value));

        if (!closes.length) {
          return {
            ...asset,
            symbol,
            status: "Error",
            reason: "No se encontraron precios válidos.",
            score: 0,
            price: null,
            trend: "flat",
            signal: "ESPERAR"
          };
        }

        const analysis = analyzeMarket(closes);
        const lastPrice = closes[closes.length - 1];

        return {
          ...asset,
          symbol,
          price: lastPrice,
          trend: analysis.trend,
          signal: analysis.signal,
          score: analysis.score,
          status: analysis.status,
          reason: analysis.reason,
          changePercent: analysis.changePercent,
          ema20: analysis.ema20,
          ema50: analysis.ema50,
          tvSymbol: asset.tvSymbol || tradingViewSymbolFromCategory(asset.category, symbol)
        };
      } catch (error) {
        return {
          ...asset,
          symbol,
          status: "Error",
          reason: "Error de conexión con la API.",
          score: 0,
          price: null,
          trend: "flat",
          signal: "ESPERAR"
        };
      }
    }

    async function updateAllMarketData() {
      const apiKey = document.getElementById("market-api-key").value.trim();
      const timeframe = document.getElementById("global-timeframe").value;
      const interval = twelveDataIntervalFromTimeframe(timeframe);

      if (!apiKey) {
        setMarketStatus("Falta API Key. Pégala arriba para actualizar precios.", "error");
        renderWatchlist();
        return;
      }

      saveMarketApiKey();
      saveTimeframe();

      setMarketStatus("Actualizando todos los precios...", "info");

      const updatedAssets = [];

      for (let i = 0; i < assets.length; i++) {
        setMarketStatus("Actualizando " + assets[i].symbol + " (" + (i + 1) + "/" + assets.length + ")...", "info");

        const updated = await fetchAssetData(assets[i], apiKey, interval);
        updatedAssets.push(updated);
      }

      assets = updatedAssets.sort((a, b) => Number(b.score) - Number(a.score));

      saveAssets();
      renderWatchlist();
      updateLastUpdate();

      setMarketStatus("Todos los precios fueron actualizados y ordenados por oportunidad.", "success");
    }

    function addAssetToWatchlist() {
      const category = document.getElementById("new-category").value;
      const rawSymbol = document.getElementById("new-symbol").value.trim();
      const rawTvSymbol = document.getElementById("new-tv-symbol").value.trim();

      if (!rawSymbol) {
        alert("Escribe un símbolo. Ej: SOXL, AAPL, EUR/USD, BTC/USDT.");
        return;
      }

      const symbol = normalizeMarketSymbol(category, rawSymbol);
      const tvSymbol = rawTvSymbol || tradingViewSymbolFromCategory(category, symbol);

      const exists = assets.some(asset => asset.symbol.toUpperCase() === symbol.toUpperCase());

      if (exists) {
        alert("Ese activo ya está en la watchlist.");
        return;
      }

      assets.push({
        symbol,
        category,
        tvSymbol,
        price: null,
        trend: "flat",
        signal: "ESPERAR",
        score: 0,
        status: "Pendiente",
        reason: "Agregado. Actualiza para buscar precio.",
        changePercent: 0,
        ema20: null,
        ema50: null
      });

      document.getElementById("new-symbol").value = "";
      document.getElementById("new-tv-symbol").value = "";

      saveAssets();
      renderWatchlist();
    }

    function removeAsset(symbol) {
      assets = assets.filter(asset => asset.symbol !== symbol);
      saveAssets();
      renderWatchlist();
    }

    function createGaugeHTML(score) {
      const safeScore = Math.round(clamp(Number(score) || 0, 0, 100));
      const deg = Math.round(safeScore * 3.6);
      const cls = safeScore >= 75 ? "" : safeScore >= 55 ? "mid" : "low";

      return `
        <div class="gauge ${cls}" style="--percent: ${deg}deg;">
          <div class="text-white font-bold">${safeScore}%</div>
        </div>
      `;
    }

    function getTrendLabel(trend) {
      if (trend === "up") return `<span class="trend-up font-bold">↑ Alcista</span>`;
      if (trend === "down") return `<span class="trend-down font-bold">↓ Bajista</span>`;
      return `<span class="trend-flat font-bold">↔ Lateral / Mixto</span>`;
    }

    function decisionClass(status) {
      if (status === "COMPRAR") return "decision-buy";
      if (status === "VENDER") return "decision-sell";
      if (status === "ESPERAR") return "decision-wait";
      return "decision-no";
    }

    function formatPrice(price) {
      if (price === null || price === undefined || Number.isNaN(Number(price))) return "Pendiente";
      const n = Number(price);

      if (n >= 1000) return n.toFixed(2);
      if (n >= 10) return n.toFixed(2);
      if (n >= 1) return n.toFixed(4);

      return n.toFixed(6);
    }

    function renderWatchlist() {
      const container = document.getElementById("watchlist-container");
      const timeframe = document.getElementById("global-timeframe")?.value || "15m";
      const tvInterval = tvIntervalFromTimeframe(timeframe);

      const sorted = [...assets].sort((a, b) => Number(b.score) - Number(a.score));

      container.innerHTML = sorted.map((asset, index) => {
        const score = Number(asset.score) || 0;
        const status = asset.status || "Pendiente";
        const cls = decisionClass(status);
        const price = formatPrice(asset.price);
        const change = Number(asset.changePercent || 0);
        const changeClass = change >= 0 ? "text-emerald-400" : "text-red-400";

        return `
          <div class="${cls} rounded-3xl p-5 md:p-6">

                  </div>

                  <div class="bg-gray-900/70 rounded-2xl p-4">

                  <div class="bg-gray-900/70 rounded-2xl p-4">

      if (savedKey) {
